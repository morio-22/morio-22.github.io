<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">AND、OR 与 XOR 的判断边界</title>
  <desc id="desc">AND 与 OR 的输入点可以被一条直线分开，而 XOR 的两类输入点无法用一条直线分开。</desc>
  <defs>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .axis { stroke: #475569; stroke-width: 2.5; }
      .grid { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 5 6; }
      .boundary { stroke: #ef4444; stroke-width: 4; stroke-dasharray: 10 7; }
      .title { fill: #0f172a; font: 700 25px system-ui, sans-serif; }
      .label { fill: #475569; font: 17px system-ui, sans-serif; }
      .legend { fill: #334155; font: 16px system-ui, sans-serif; }
      .zero { fill: #3b82f6; stroke: #ffffff; stroke-width: 4; }
      .one { fill: #f59e0b; stroke: #ffffff; stroke-width: 4; }
      .value { fill: #ffffff; font: 700 16px system-ui, sans-serif; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect width="1200" height="430" rx="24" fill="#eef2f7"/>

  <g transform="translate(30 24)">
    <rect class="panel" width="360" height="330" rx="18"/>
    <text class="title" x="180" y="42" text-anchor="middle">AND：线性可分</text>
    <line class="grid" x1="85" y1="85" x2="85" y2="275"/>
    <line class="grid" x1="275" y1="85" x2="275" y2="275"/>
    <line class="grid" x1="85" y1="85" x2="275" y2="85"/>
    <line class="grid" x1="85" y1="275" x2="275" y2="275"/>
    <line class="axis" x1="60" y1="295" x2="310" y2="295"/>
    <line class="axis" x1="60" y1="305" x2="60" y2="60"/>
    <text class="label" x="315" y="301">x₁</text>
    <text class="label" x="49" y="54">x₂</text>
    <text class="label" x="80" y="318">0</text>
    <text class="label" x="270" y="318">1</text>
    <text class="label" x="38" y="280">0</text>
    <text class="label" x="38" y="91">1</text>
    <line class="boundary" x1="162" y1="68" x2="292" y2="198"/>
    <circle class="zero" cx="85" cy="275" r="15"/><text class="value" x="85" y="275">0</text>
    <circle class="zero" cx="85" cy="85" r="15"/><text class="value" x="85" y="85">0</text>
    <circle class="zero" cx="275" cy="275" r="15"/><text class="value" x="275" y="275">0</text>
    <circle class="one" cx="275" cy="85" r="15"/><text class="value" x="275" y="85">1</text>
  </g>

  <g transform="translate(420 24)">
    <rect class="panel" width="360" height="330" rx="18"/>
    <text class="title" x="180" y="42" text-anchor="middle">OR：线性可分</text>
    <line class="grid" x1="85" y1="85" x2="85" y2="275"/>
    <line class="grid" x1="275" y1="85" x2="275" y2="275"/>
    <line class="grid" x1="85" y1="85" x2="275" y2="85"/>
    <line class="grid" x1="85" y1="275" x2="275" y2="275"/>
    <line class="axis" x1="60" y1="295" x2="310" y2="295"/>
    <line class="axis" x1="60" y1="305" x2="60" y2="60"/>
    <text class="label" x="315" y="301">x₁</text>
    <text class="label" x="49" y="54">x₂</text>
    <text class="label" x="80" y="318">0</text>
    <text class="label" x="270" y="318">1</text>
    <text class="label" x="38" y="280">0</text>
    <text class="label" x="38" y="91">1</text>
    <line class="boundary" x1="68" y1="212" x2="148" y2="292"/>
    <circle class="zero" cx="85" cy="275" r="15"/><text class="value" x="85" y="275">0</text>
    <circle class="one" cx="85" cy="85" r="15"/><text class="value" x="85" y="85">1</text>
    <circle class="one" cx="275" cy="275" r="15"/><text class="value" x="275" y="275">1</text>
    <circle class="one" cx="275" cy="85" r="15"/><text class="value" x="275" y="85">1</text>
  </g>

  <g transform="translate(810 24)">
    <rect class="panel" width="360" height="330" rx="18"/>
    <text class="title" x="180" y="42" text-anchor="middle">XOR：线性不可分</text>
    <line class="grid" x1="85" y1="85" x2="85" y2="275"/>
    <line class="grid" x1="275" y1="85" x2="275" y2="275"/>
    <line class="grid" x1="85" y1="85" x2="275" y2="85"/>
    <line class="grid" x1="85" y1="275" x2="275" y2="275"/>
    <line class="axis" x1="60" y1="295" x2="310" y2="295"/>
    <line class="axis" x1="60" y1="305" x2="60" y2="60"/>
    <text class="label" x="315" y="301">x₁</text>
    <text class="label" x="49" y="54">x₂</text>
    <text class="label" x="80" y="318">0</text>
    <text class="label" x="270" y="318">1</text>
    <text class="label" x="38" y="280">0</text>
    <text class="label" x="38" y="91">1</text>
    <circle class="zero" cx="85" cy="275" r="15"/><text class="value" x="85" y="275">0</text>
    <circle class="one" cx="85" cy="85" r="15"/><text class="value" x="85" y="85">1</text>
    <circle class="one" cx="275" cy="275" r="15"/><text class="value" x="275" y="275">1</text>
    <circle class="zero" cx="275" cy="85" r="15"/><text class="value" x="275" y="85">0</text>
  </g>

  <g transform="translate(370 382)">
    <circle class="zero" cx="0" cy="0" r="11"/><text class="value" x="0" y="0" style="font-size:12px">0</text>
    <text class="legend" x="20" y="6">输出 0</text>
    <circle class="one" cx="115" cy="0" r="11"/><text class="value" x="115" y="0" style="font-size:12px">1</text>
    <text class="legend" x="135" y="6">输出 1</text>
    <line class="boundary" x1="250" y1="0" x2="310" y2="0"/>
    <text class="legend" x="325" y="6">单层感知机的判断边界</text>
  </g>
</svg>
